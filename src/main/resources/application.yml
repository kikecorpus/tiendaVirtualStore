spring:
  application:
    name: virtual-store

  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tienda_virtual}
    username: ${SPRING_DATASOURCE_USERNAME:kikecorpus}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:true}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
  pageable-as-query-param: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  show-actuator: false
  model-and-view-allowed: false

jwt:
  secret:             ${JWT_SECRET:cambia-esto-por-un-secreto-seguro-32chars!}
  expiration:         ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cors:
  allowed-origin: ${FRONTEND_URL:http://localhost:5173}

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN:}
  success-url:  ${MERCADOPAGO_SUCCESS_URL:http://localhost:8080/api/payments/success}
  failure-url:  ${MERCADOPAGO_FAILURE_URL:http://localhost:8080/api/payments/failure}
  pending-url:  ${MERCADOPAGO_PENDING_URL:http://localhost:8080/api/payments/pending}
  webhook-url:  ${MERCADOPAGO_WEBHOOK_URL:http://localhost:8080/api/payments/webhook}